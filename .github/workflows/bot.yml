name: Telegram Bot

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: pip install python-telegram-bot==20.7
    - name: Run bot
      env:
        TOKEN: ${{ secrets.TOKEN }}
        CLINIC_CHAT_ID: ${{ secrets.CLINIC_CHAT_ID }}
      run: timeout 270 python main.py || true
